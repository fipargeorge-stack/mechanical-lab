<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORGE TROUSIA | Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.15; pointer-events: none; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--neon-cyan); }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        .container { max-width: 600px; margin: -30px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .admin-box { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--neon-cyan); padding: 25px; border-radius: 25px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .input-form { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], textarea { width: 100%; background: #0a192f; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; color: white; outline: none; }
        .file-label { width: 100%; background: rgba(0, 242, 255, 0.05); border: 2px dashed var(--neon-cyan); padding: 15px; border-radius: 12px; color: var(--neon-cyan); text-align: center; cursor: pointer; font-weight: bold; }
        .btn-add { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-purple); }
        .grid { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .card { background: rgba(15, 23, 42, 0.8); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; height: auto; border-bottom: 1px solid var(--neon-cyan); cursor: pointer; }
        .card-body { padding: 20px; }
        .delete-btn { color: #ff4d4d; background: none; border: 1px solid #ff4d4d; padding: 5px 10px; border-radius: 8px; cursor: pointer; float: left; margin-top: 10px; }
        
        /* AI Robot */
        #ai-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        #ai-trigger { width: 70px; height: 70px; background: var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: none; box-shadow: 0 0 20px var(--neon-cyan); cursor: grab; }
        #ai-window { display: none; width: 300px; height: 400px; background: #0f172a; border: 2px solid var(--neon-cyan); border-radius: 20px; flex-direction: column; overflow: hidden; margin-bottom: 10px; box-shadow: 0 0 30px #000; }
    </style>
</head>
<body>
    <div class="bg-elements"><i class="fas fa-cog gear" style="top:5%; left:5%; font-size: 100px;"></i></div>
    <header><h1>GEORGE TROUSIA</h1></header>
    <div class="container">
        <div class="admin-box">
            <h3 style="color:var(--neon-cyan); text-align:center;">إضافة ابتكار جديد</h3>
            <div class="input-form">
                <input type="text" id="pTitle" placeholder="اسم المشروع">
                <label class="file-label"><i class="fas fa-camera"></i> ارفع صورة المشروع <input type="file" id="pFile" accept="image/*" style="display:none"></label>
                <textarea id="pDesc" rows="4" placeholder="المواصفات التقنية..."></textarea>
                <button class="btn-add" onclick="saveProject()">تشفير وحفظ في المعمل</button>
            </div>
        </div>
        <div id="displayArea" class="grid"></div>
    </div>

    <div id="ai-container">
        <div id="ai-window">
            <div style="background:var(--neon-cyan); color:#000; padding:10px; font-weight:bold; display:flex; justify-content:space-between;">
                <span>🤖 مساعد TROUSIA</span><span onclick="toggleChat()" style="cursor:pointer">×</span>
            </div>
            <div id="chatBox" style="flex:1; padding:10px; overflow-y:auto; background:#020617; font-size:13px; color:var(--neon-cyan)">أهلاً بك مهندس جورج في مختبرك الخاص. الصور تحت الحماية الآن.</div>
        </div>
        <button id="ai-trigger">🤖</button>
    </div>

    <script>
        const DB_NAME = 'georg_final_v1';

        function saveProject() {
            const title = document.getElementById('pTitle').value;
            const desc = document.getElementById('pDesc').value;
            const file = document.getElementById('pFile').files[0];
            if (!title || !file) return alert("البيانات ناقصة يا هندسة!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
                db.push({ id: Date.now().toString(), title, desc, image: e.target.result, gallery: [] });
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            document.getElementById('displayArea').innerHTML = db.map(p => `
                <div class="card">
                    <img src="${p.image}" onclick="location.href='project.html?id=${p.id}'">
                    <div class="card-body">
                        <h3 style="color:var(--neon-cyan);margin:0">${p.title}</h3>
                        <p style="color:#94a3b8; font-size:13px;">${p.desc.substring(0,60)}...</p>
                        <button class="delete-btn" onclick="deleteP('${p.id}')">حذف المشروع</button>
                    </div>
                </div>`).join('');
        }

        function deleteP(id) { if(confirm("حذف المشروع؟")) { let db = JSON.parse(localStorage.getItem(DB_NAME)).filter(x=>x.id!==id); localStorage.setItem(DB_NAME,JSON.stringify(db)); render(); } }

        // AI Logic & Dragging
        const dragBtn = document.getElementById('ai-trigger');
        const container = document.getElementById('ai-container');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        dragBtn.onmousedown = (e) => { initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; active = true; };
        document.onmousemove = (e) => { if(active) { currentX = e.clientX - initialX; currentY = e.clientY - initialY; xOffset = currentX; yOffset = currentY; container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`; } };
        document.onmouseup = () => active = false;
        function toggleChat() { const win = document.getElementById('ai-window'); win.style.display = win.style.display === 'flex' ? 'none' : 'flex'; }
        dragBtn.onclick = () => { if(!active) toggleChat(); };

        window.onload = render;
    </script>
</body>
</html>
