<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORG TRUSSIA | Futuristic Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; --card-bg: rgba(15, 23, 42, 0.8); }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* التروس الخلفية */
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.15; pointer-events: none; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--neon-cyan); background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%); }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon-cyan)); }

        .container { max-width: 600px; margin: -30px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .admin-box { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--neon-cyan); padding: 25px; border-radius: 25px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        .input-form { display: flex; flex-direction: column; gap: 15px; }
        input[type="text"], textarea { width: 100%; background: #0a192f; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; color: white; font-size: 1rem; outline: none; }
        
        .file-label { width: 100%; background: rgba(0, 242, 255, 0.05); border: 2px dashed var(--neon-cyan); padding: 15px; border-radius: 12px; color: var(--neon-cyan); text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        input[type="file"] { display: none; }

        .btn-add { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-add:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-purple); }

        .grid { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; height: auto; max-height: 300px; object-fit: cover; border-bottom: 1px solid var(--neon-cyan); cursor: pointer; }
        .card-body { padding: 20px; }
        .delete-btn { color: #ff4d4d; background: none; border: 1px solid #ff4d4d; padding: 5px 10px; border-radius: 8px; cursor: pointer; float: left; font-size: 12px; margin-top: 10px; }

        /* AI Widget */
        #ai-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        #ai-window { display: none; width: 300px; height: 400px; background: #0f172a; border: 2px solid var(--neon-cyan); border-radius: 20px; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px #000; margin-bottom: 10px; }
        .ai-header { background: var(--neon-cyan); color: #000; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; cursor: move; }
        #chat-box { flex: 1; padding: 10px; overflow-y: auto; background: #020617; display: flex; flex-direction: column; gap: 8px; }
        .ai-input { padding: 10px; display: flex; gap: 5px; background: #0f172a; }
        #ai-trigger { width: 70px; height: 70px; background: var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: none; box-shadow: 0 0 20px var(--neon-cyan); cursor: grab; }
    </style>
</head>
<body>

    <div class="bg-elements">
        <i class="fas fa-cog gear" style="top:5%; left:5%; font-size: 120px;"></i>
        <i class="fas fa-cog gear" style="bottom:10%; right:5%; font-size: 180px; animation-duration: 25s; animation-direction: reverse;"></i>
    </div>

    <header>
        <h1>GEORG TRUSSIA</h1>
        <p style="color: var(--neon-cyan); letter-spacing: 3px; font-size: 12px;">AI MECHANICAL LAB</p>
    </header>

    <div class="container">
        <div class="admin-box">
            <h3 style="color: var(--neon-cyan); margin-top:0; text-align: center;"><i class="fas fa-microchip"></i> إضافة ابتكار جديد</h3>
            <div class="input-form">
                <input type="text" id="t" placeholder="اسم المشروع">
                <label class="file-label">
                    <i class="fas fa-camera"></i> ارفع صورة المشروع
                    <input type="file" id="f" accept="image/*">
                </label>
                <textarea id="d" rows="4" placeholder="المواصفات التقنية..."></textarea>
                <button class="btn-add" onclick="core.add()">تشفير وحفظ في المعمل</button>
            </div>
        </div>
        <div id="display" class="grid"></div>
    </div>

    <div id="ai-container">
        <div id="ai-window">
            <div class="ai-header" id="ai-move"><span>🤖 مساعد TRUSSIA</span><span onclick="toggleChat()" style="cursor:pointer">×</span></div>
            <div id="chat-box"><div style="background:#1e293b; color:var(--neon-cyan); padding:8px; border-radius:8px; align-self:flex-start; font-size:13px;">أهلاً مهندس جورج، الصور والمعلومات الآن تحت الحماية!</div></div>
            <div class="ai-input">
                <input type="text" id="user-in" placeholder="اسأل.." style="flex:1; background:#000; border:1px solid var(--neon-cyan); color:#fff; padding:5px; border-radius:5px;">
                <button onclick="sendMsg()" style="background:var(--neon-cyan); border:none; padding:5px 10px; border-radius:5px;">➤</button>
            </div>
        </div>
        <button id="ai-trigger">🤖</button>
    </div>

    <script>
        // توحيد اسم قاعدة البيانات لضمان عدم الضياع
        const DB_NAME = 'georg_final_v1';

        const core = {
            db: JSON.parse(localStorage.getItem(DB_NAME)) || [],
            add: function() {
                const t = document.getElementById('t').value, 
                      d = document.getElementById('d').value, 
                      f = document.getElementById('f').files[0];
                
                if(!t || !f) return alert("البيانات ناقصة يا هندسة!");

                const r = new FileReader();
                r.onloadend = () => {
                    const newProject = { 
                        id: Date.now().toString(), 
                        title: t, 
                        image: r.result, 
                        desc: d, 
                        gallery: [] 
                    };
                    this.db.push(newProject);
                    localStorage.setItem(DB_NAME, JSON.stringify(this.db));
                    this.render();
                    this.clear();
                    alert("تم الحفظ بنجاح!");
                };
                r.readAsDataURL(f);
            },
            render: function() {
                const display = document.getElementById('display');
                display.innerHTML = this.db.map(p => `
                    <div class="card">
                        <img src="${p.image}" onclick="location.href='project.html?id=${p.id}'">
                        <div class="card-body">
                            <h3 style="color:var(--neon-cyan); margin:0">${p.title}</h3>
                            <p style="color:#94a3b8; font-size:14px; margin: 10px 0;">${p.desc.substring(0,80)}...</p>
                            <button class="delete-btn" onclick="core.del('${p.id}')">حذف المشروع</button>
                        </div>
                    </div>`).join('');
            },
            del: function(id) {
                if(confirm("هل تريد حذف هذا الابتكار نهائياً؟")) {
                    this.db = this.db.filter(x => x.id !== id);
                    localStorage.setItem(DB_NAME, JSON.stringify(this.db));
                    this.render();
                }
            },
            clear: function() {
                document.getElementById('t').value = '';
                document.getElementById('f').value = '';
                document.getElementById('d').value = '';
            }
        };

        // نظام تحريك الروبوت
        const drag = document.getElementById('ai-container');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
        
        document.getElementById('ai-trigger').addEventListener("mousedown", (e) => {
            initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; active = true;
        });
        document.addEventListener("mousemove", (e) => {
            if (active) {
                currentX = e.clientX - initialX; currentY = e.clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                drag.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        });
        document.addEventListener("mouseup", () => active = false);

        function toggleChat() { 
            const w = document.getElementById('ai-window'); 
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; 
        }
        
        document.getElementById('ai-trigger').onclick = (e) => { if(!active) toggleChat(); };

        function sendMsg() {
            const i = document.getElementById('user-in'), b = document.getElementById('chat-box');
            if(!i.value) return;
            b.innerHTML += `<div style="background:var(--neon-purple); color:#fff; padding:8px; border-radius:8px; align-self:flex-end; font-size:13px;">${i.value}</div>`;
            i.value = ''; b.scrollTop = b.scrollHeight;
            setTimeout(() => {
                b.innerHTML += `<div style="background:#1e293b; color:var(--neon-cyan); padding:8px; border-radius:8px; align-self:flex-start; font-size:13px;">تم استلام البيانات يا جورج، جاري المعالجة..</div>`;
                b.scrollTop = b.scrollHeight;
            }, 800);
        }

        window.onload = () => core.render();
    </script>
</body>
</html>
