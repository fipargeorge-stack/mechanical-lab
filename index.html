<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر التصاميم الهندسية</title>
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #00509d;
            --light-blue: #e6f0ff;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-blue);
            color: var(--primary-blue);
            text-align: center;
        }

        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 2rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .main-img {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            margin: 20px 0;
            border: 3px solid var(--accent-blue);
        }

        .section {
            margin: 40px 0;
            padding: 20px;
            border-bottom: 2px inset var(--light-blue);
        }

        .work-img {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .work-img:hover {
            transform: scale(1.05);
        }

        /* تنسيق صندوق الذكاء الاصطناعي */
        #ai-chat {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 250px;
            background: var(--primary-blue);
            color: white;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        footer {
            background: #f1f1f1;
            padding: 15px;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>مختبر التصاميم الهندسية</h1>
    <p>دقة في التصميم.. إبداع في التنفيذ</p>
</header>

<div class="container">
    <div class="section">
        <img src="1773296456884.png" alt="مقدمة التصميم" class="main-img">
        <h2>أهلاً بك في مختبرنا</h2>
        <p>نحن نقدم حلولاً هندسية مبتكرة باستخدام أحدث التقنيات.</p>
    </div>

    <div class="section">
        <h3>أحدث المشاريع: الخرطوشة الدخانية</h3>
        <img src="1773130599107.png" alt="الخرطوشة الدخانية" class="work-img">
        <p>تصميم هندسي متقدم يحاكي الأنظمة الصناعية الحديثة.</p>
    </div>
</div>

<div id="ai-chat" onclick="alert('مساعد الذكاء الاصطناعي: أهلاً بك! كيف يمكنني مساعدتك في مشروعك الهندسي اليوم؟')">
    <span>🤖</span>
    <span>مساعد المهندس الذكي (AI)</span>
</div>

<footer>
    &copy; 2026 جميع الحقوق محفوظة لـ **جورج تروسيا**
</footer>

</body>
</html>
