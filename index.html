<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORG TRUSSIA | Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        header { padding: 30px 10px; text-align: center; border-bottom: 2px solid var(--neon-cyan); margin-bottom: 20px; }
        h1 { font-size: 2.2rem; margin:0; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 600px; margin: 0 auto; }
        .admin-box { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--neon-cyan); padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        
        /* حل مشكلة التداخل: كل شي فوق بعض */
        .input-form { display: flex; flex-direction: column; gap: 15px; }
        
        input[type="text"], textarea { 
            width: 100%; 
            background: #0a192f; 
            border: 1px solid #1e293b; 
            padding: 15px; 
            border-radius: 12px; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        /* تصميم زر رفع الصور الواسع */
        .file-label {
            width: 100%;
            background: rgba(0, 242, 255, 0.05);
            border: 2px dashed var(--neon-cyan);
            padding: 15px;
            border-radius: 12px;
            color: var(--neon-cyan);
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
        }
        input[type="file"] { display: none; }

        .btn-add { 
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); 
            color: white; border: none; padding: 18px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 5px;
        }

        .grid { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .card img { width: 100%; height: auto; max-height: 250px; object-fit: cover; }
        .card-body { padding: 15px; }
        
        #ai-bot { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; box-shadow: 0 0 15px var(--neon-cyan); z-index: 100; }
    </style>
</head>
<body>
    <header><h1>TRUSSIA LAB</h1></header>

    <div class="container">
        <div class="admin-box">
            <h3 style="color: var(--neon-cyan); margin-top:0; text-align: center;">إضافة ابتكار جديد</h3>
            <div class="input-form">
                <input type="text" id="t" placeholder="اسم المشروع">
                
                <label class="file-label">
                    <i class="fas fa-image"></i> ارفع صورة الابتكار
                    <input type="file" id="f" accept="image/*">
                </label>

                <textarea id="d" rows="4" placeholder="المواصفات الهندسية..."></textarea>
                
                <button class="btn-add" onclick="core.add()">تشفير وحفظ في المعمل</button>
            </div>
        </div>
        <div id="display" class="grid"></div>
    </div>

    <button id="ai-bot" onclick="alert('جاهز للعمل يا هندسة!')">🤖</button>

    <script>
        const core = {
            db: JSON.parse(localStorage.getItem('georg_vfinal_db')) || [],
            add: function() {
                const t = document.getElementById('t').value, d = document.getElementById('d').value, f = document.getElementById('f').files[0];
                if(!t || !f) return alert("يرجى ملء الاسم والصورة");
                const r = new FileReader();
                r.onloadend = () => {
                    this.db.push({ id: Date.now(), title: t, image: r.result, desc: d, gallery: [] });
                    localStorage.setItem('georg_vfinal_db', JSON.stringify(this.db));
                    this.render(); this.clear();
                };
                r.readAsDataURL(f);
            },
            render: function() {
                document.getElementById('display').innerHTML = this.db.map(p => `
                    <div class="card" onclick="location.href='project.html?id=${p.id}'">
                        <img src="${p.image}">
                        <div class="card-body">
                            <h3 style="color:var(--neon-cyan); margin:0">${p.title}</h3>
                            <p style="color:#94a3b8; font-size: 14px;">${p.desc.substring(0,60)}...</p>
                        </div>
                    </div>`).join('');
            },
            clear: function() { document.getElementById('t').value=''; document.getElementById('f').value=''; document.getElementById('d').value=''; }
        };
        window.onload = () => core.render();
    </script>
</body>
</html>
