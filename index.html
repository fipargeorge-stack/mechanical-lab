<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر جورج تروسيا للهندسة المتقدمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات الألوان المتطورة */
        :root {
            --bg-deep: #050a14;
            --panel-bg: #0d1626;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --accent-grad: linear-gradient(45deg, #00f2ff, #bc13fe);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* خلفية جزيئات متحركة باستخدام CSS */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        header {
            background: linear-gradient(180deg, rgba(13, 22, 38, 0.9) 0%, rgba(5, 10, 20, 0.8) 100%);
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid var(--neon-cyan);
        }

        header::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), transparent 30%);
            animation: rotate 10s linear infinite;
            z-index: -1;
            opacity: 0.1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .logo-area h1 {
            font-size: 3rem;
            margin: 0;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .container {
            max-width: 1100px;
            margin: -50px auto 50px;
            padding: 0 20px;
            position: relative;
        }

        /* لوحة التحكم الاحترافية */
        .glass-panel {
            background: rgba(13, 22, 38, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--neon-cyan); font-weight: bold; }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); outline: none; }

        .btn-glow {
            background: var(--accent-grad);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glow:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(188, 19, 254, 0.5); }

        /* معرض المشاريع الميكانيكية */
        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
        }

        .section-title div { height: 2px; flex-grow: 1; background: var(--accent-grad); opacity: 0.3; }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover { transform: translateY(-15px); border-color: var(--neon-cyan); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }

        .card-img-container { height: 220px; overflow: hidden; position: relative; background: #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); filter: brightness(1.2); }

        .card-body { padding: 25px; }
        .card h3 { margin: 0 0 10px 0; color: var(--neon-cyan); font-size: 1.4rem; }
        .card p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; height: 60px; overflow: hidden; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .del-btn { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .del-btn:hover { background: #ff4d4d; color: white; }

        /* بوت المساعد الذكي */
        #ai-trigger {
            position: fixed; bottom: 30px; left: 30px;
            width: 70px; height: 70px;
            background: var(--accent-grad);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            animation: float 3s ease-in-out infinite;
            z-index: 1000;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        footer { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <header>
        <div class="logo-area">
            <h1>GEORGIA TRUSSIA LAB</h1>
            <p>المختبر الهندسي للابتكارات الميكانيكية</p>
        </div>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2 style="margin-top:0; color: var(--neon-cyan);"><i class="fas fa-microchip"></i> نظام إضافة البيانات</h2>
            <div class="input-group">
                <label>اسم المشروع الميكانيكي</label>
                <input type="text" id="pTitle" placeholder="مثال: السكين المختفي V1">
            </div>
            <div class="input-group">
                <label>رابط الصورة أو اسم الملف</label>
                <input type="text" id="pImg" placeholder="1773296456884.png">
            </div>
            <div class="input-group">
                <label>التفاصيل التقنية</label>
                <textarea id="pDesc" rows="3" placeholder="اشرح ميكانيكية العمل هنا..."></textarea>
            </div>
            <button class="btn-glow" onclick="engine.save()">حفظ في قاعدة البيانات المحلية</button>
        </div>

        <div class="section-title">
            <h2><i class="fas fa-project-diagram" style="color:var(--neon-purple)"></i> معرض الأعمال الهندسية</h2>
            <div></div>
        </div>

        <div id="projectsDisplay" class="projects-grid">
            </div>
    </div>

    <div id="ai-trigger" onclick="engine.aiResponse()">🤖</div>

    <footer>
        <p>تصميم وتطوير نظام المختبر بواسطة <strong>جورج تروسيا</strong> &copy; 2026</p>
        <p style="font-size: 12px; opacity: 0.5;">تم استخدام تقنيات HTML5, CSS3, و JavaScript LocalStorage</p>
    </footer>

    <script>
        const engine = {
            // حفظ المشروع
            save: function() {
                const t = document.getElementById('pTitle').value;
                const i = document.getElementById('pImg').value;
                const d = document.getElementById('pDesc').value;

                if(!t || !i) return alert("خطأ: يرجى إدخال اسم المشروع والصورة!");

                const project = {
                    id: Date.now(),
                    title: t,
                    img: i.startsWith('http') ? i : `./${i}`, // معالجة المسار تلقائياً
                    desc: d
                };

                let db = JSON.parse(localStorage.getItem('georg_db')) || [];
                db.push(project);
                localStorage.setItem('georg_db', JSON.stringify(db));

                this.render();
                this.clear();
            },

            // عرض المشاريع
            render: function() {
                const container = document.getElementById('projectsDisplay');
                const db = JSON.parse(localStorage.getItem('georg_db')) || [];
                
                container.innerHTML = db.map(p => `
                    <div class="card">
                        <div class="card-img-container">
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x200/0d1626/00f2ff?text=Check+Image+Path'">
                        </div>
                        <div class="card-body">
                            <h3>${p.title}</h3>
                            <p>${p.desc}</p>
                            <div class="card-footer">
                                <span style="font-size:12px; color:var(--neon-purple)">ID: #${p.id.toString().slice(-4)}</span>
                                <button class="del-btn" onclick="engine.delete(${p.id})"><i class="fas fa-trash"></i> حذف</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            delete: function(id) {
                let db = JSON.parse(localStorage.getItem('georg_db'));
                db = db.filter(p => p.id !== id);
                localStorage.setItem('georg_db', JSON.stringify(db));
                this.render();
            },

            clear: function() {
                document.getElementById('pTitle').value = '';
                document.getElementById('pImg').value = '';
                document.getElementById('pDesc').value = '';
            },

            aiResponse: function() {
                const count = (JSON.parse(localStorage.getItem('georg_db')) || []).length;
                alert(`تحليل النظام: أهلاً مهندس جورج. قاعدة البيانات تحتوي على ${count} مشاريع نشطة. الحالة: مستقر. الصور التي تنتهي بـ .png يتم جلبها الآن من المستودع الرئيسي.`);
            }
        };

        // التشغيل الأولي
        window.onload = () => engine.render();
    </script>
</body>
</html>
