<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام جورج تروسيا الهندسي</title>
    <style>
        :root { --dark: #0a192f; --neon: #64ffda; --slate: #8892b0; --white: #e6f1ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding-bottom: 50px; }
        header { background: #112240; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--neon); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--neon); margin: 0; font-size: 2rem; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* لوحة التحكم */
        .admin-panel { background: #172a45; padding: 25px; border-radius: 15px; border: 1px solid var(--neon); margin-bottom: 40px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0a192f; border: 1px solid var(--slate); color: white; border-radius: 8px; box-sizing: border-box; }
        input:focus { border-color: var(--neon); outline: none; }
        button { background: var(--neon); color: var(--dark); border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #45c7a9; transform: scale(1.02); }

        /* شبكة المشاريع */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .project-card { background: #112240; border-radius: 12px; overflow: hidden; border: 1px solid #233554; transition: 0.3s; position: relative; }
        .project-card:hover { border-color: var(--neon); transform: translateY(-10px); }
        .project-card img { width: 100%; height: 200px; object-fit: cover; }
        .project-card-content { padding: 20px; }
        .project-card h3 { color: var(--neon); margin-top: 0; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }

        /* مساعد AI */
        #ai-bot { position: fixed; bottom: 20px; left: 20px; background: var(--neon); color: var(--dark); padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>مختبر جورج تروسيا الهندسي 🤖</h1>
    <p>نظام إدارة المشاريع الدائم v2.0</p>
</header>

<div class="container">
    <div class="admin-panel">
        <h3 style="color: var(--neon); margin-top: 0;">➕ إضافة مشروع جديد للداتا</h3>
        <input type="text" id="pTitle" placeholder="عنوان المشروع">
        <input type="text" id="pImg" placeholder="اسم الصورة (مثال: 1773296456884.png)">
        <textarea id="pDesc" rows="3" placeholder="وصف المشروع بالتفصيل..."></textarea>
        <button onclick="saveProject()">حفظ المشروع بشكل دائم</button>
    </div>

    <h2 style="border-right: 4px solid var(--neon); padding-right: 15px;">معرض المشاريع</h2>
    <div class="projects-grid" id="projectsContainer">
        </div>
</div>

<div id="ai-bot" onclick="aiTalk()">🤖 مساعد AI</div>

<script>
    // وظيفة لتحميل المشاريع من الذاكرة عند فتح الصفحة
    window.onload = function() {
        displayProjects();
    };

    function saveProject() {
        const title = document.getElementById('pTitle').value;
        const img = document.getElementById('pImg').value;
        const desc = document.getElementById('pDesc').value;

        if(!title || !img) { alert("يرجى ملء البيانات الأساسية!"); return; }

        const project = { title, img, desc, id: Date.now() };

        // جلب المشاريع القديمة أو إنشاء مصفوفة جديدة
        let projects = JSON.parse(localStorage.getItem('myProjects')) || [];
        projects.push(project);

        // حفظ في ذاكرة المتصفح
        localStorage.setItem('myProjects', JSON.stringify(projects));

        // تنظيف الخانات وتحديث العرض
        document.getElementById('pTitle').value = '';
        document.getElementById('pImg').value = '';
        document.getElementById('pDesc').value = '';
        displayProjects();
        alert("تم الحفظ بنجاح في نظامك!");
    }

    function displayProjects() {
        const container = document.getElementById('projectsContainer');
        const projects = JSON.parse(localStorage.getItem('myProjects')) || [];
        
        container.innerHTML = ''; // مسح المحتوى الحالي

        projects.forEach(p => {
            container.innerHTML += `
                <div class="project-card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Missing'">
                    <div class="project-card-content">
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <button class="delete-btn" onclick="deleteProject(${p.id})">حذف المشروع</button>
                    </div>
                </div>
            `;
        });
    }

    function deleteProject(id) {
        let projects = JSON.parse(localStorage.getItem('myProjects'));
        projects = projects.filter(p => p.id !== id);
        localStorage.setItem('myProjects', JSON.stringify(projects));
        displayProjects();
    }

    function aiTalk() {
        const projects = JSON.parse(localStorage.getItem('myProjects')) || [];
        alert(`أهلاً جورج! نظامك يحتوي حالياً على ${projects.length} مشاريع محفوظة في الذاكرة. هل نخطط لمشروع جديد؟`);
    }
</script>

</body>
</html>
