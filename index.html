<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORG TRUSSIA | AI Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.1; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 15s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        header { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid var(--neon-cyan); background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%); text-align: center; }
        h1 { font-size: 3rem; margin:0; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        .container { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; }
        .admin-box { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--neon-cyan); padding: 30px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { background: #0a192f; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; color: white; width: 100%; }
        .btn-add { grid-column: span 2; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        #ai-widget { position: fixed; bottom: 20px; left: 20px; z-index: 1000; }
        #ai-chat { width: 300px; height: 400px; background: #0f172a; border: 1px solid var(--neon-cyan); border-radius: 20px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px #000; }
        .ai-header { background: var(--neon-cyan); color: #000; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .ai-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.9rem; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .msg.bot { background: #1e293b; color: var(--neon-cyan); align-self: flex-start; }
        .msg.user { background: var(--neon-purple); color: #fff; align-self: flex-end; }
        .ai-input { display: flex; border-top: 1px solid #1e293b; }
        .ai-input input { border: none; background: none; flex: 1; padding: 10px; color: #fff; outline:none; }
        #ai-trigger { width: 65px; height: 65px; background: var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 0 20px var(--neon-cyan); border: none; }
    </style>
</head>
<body>
    <div class="bg-elements">
        <i class="fas fa-cog gear" style="top:10%; left:5%; font-size: 100px;"></i>
        <i class="fas fa-cog gear" style="bottom:10%; right:10%; font-size: 150px; animation-direction: reverse;"></i>
    </div>
    <header>
        <h1>GEORG TRUSSIA</h1>
        <p style="color: var(--neon-cyan); letter-spacing: 5px;">AI MECHANICAL LAB</p>
    </header>
    <div class="container">
        <div class="admin-box">
            <h2 style="color: var(--neon-cyan); margin-top:0"><i class="fas fa-plus-circle"></i> إضافة ابتكار جديد</h2>
            <div class="input-grid">
                <input type="text" id="t" placeholder="اسم المشروع">
                <input type="file" id="f" accept="image/*">
                <textarea id="d" style="grid-column: span 2" rows="3" placeholder="وصف ميكانيكي سريع..."></textarea>
                <button class="btn-add" onclick="core.add()">تشفير وحفظ في المعمل</button>
            </div>
        </div>
        <div id="display" class="grid"></div>
    </div>
    <div id="ai-widget">
        <div id="ai-chat">
            <div class="ai-header"><span>🤖 المساعد الذكي</span> <span onclick="core.toggleAI()" style="cursor:pointer">×</span></div>
            <div class="ai-messages" id="ai-box"><div class="msg bot">أهلاً مهندس جورج! كيف أساعدك في تطوير تروسك اليوم؟</div></div>
            <div class="ai-input"><input type="text" id="ai-in" placeholder="اسألني عن مشروعك..." onkeypress="if(event.key==='Enter') core.aiChat()"></div>
        </div>
        <button id="ai-trigger" onclick="core.toggleAI()">🤖</button>
    </div>
    <script>
        const core = {
            db: JSON.parse(localStorage.getItem('georg_v5_db')) || [],
            add: function() {
                const t = document.getElementById('t').value, d = document.getElementById('d').value, f = document.getElementById('f').files[0];
                if(!t || !f) return alert("البيانات ناقصة يا هندسة!");
                const r = new FileReader();
                r.onloadend = () => {
                    this.db.push({ id: Date.now(), title: t, image: r.result, desc: d, gallery: [] });
                    localStorage.setItem('georg_v5_db', JSON.stringify(this.db));
                    this.render(); this.clear();
                    this.botMsg(`تم تشفير "${t}"! هل تريد نصيحة بخصوص نظام الزنبرك؟`);
                };
                r.readAsDataURL(f);
            },
            render: function() {
                document.getElementById('display').innerHTML = this.db.map(p => `
                    <div class="card" onclick="location.href='project.html?id=${p.id}'">
                        <img src="${p.image}">
                        <div class="card-body">
                            <h3 style="color:var(--neon-cyan); margin:0">${p.title}</h3>
                            <p style="font-size:12px; color:#94a3b8">${p.desc.substring(0,60)}...</p>
                            <button onclick="event.stopPropagation(); core.del(${p.id})" style="color:#ff4d4d; border:none; background:none; cursor:pointer; margin-top:10px">حذف</button>
                        </div>
                    </div>`).join('');
            },
            del: function(id) { this.db = this.db.filter(x => x.id !== id); localStorage.setItem('georg_v5_db', JSON.stringify(this.db)); this.render(); },
            toggleAI: function() { const c = document.getElementById('ai-chat'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; },
            aiChat: function() {
                const i = document.getElementById('ai-in'); if(!i.value) return;
                this.userMsg(i.value); const q = i.value.toLowerCase(); i.value = '';
                setTimeout(() => {
                    if(q.includes('سكين')) this.botMsg("أنصحك باستخدام نظام Sliding Gear للسكين المختفي.");
                    else this.botMsg("فهمت قصدك، جاري مراجعة المخططات الهندسية لهذا الطلب.");
                }, 1000);
            },
            userMsg: function(m) { document.getElementById('ai-box').innerHTML += `<div class="msg user">${m}</div>`; this.scroll(); },
            botMsg: function(m) { document.getElementById('ai-box').innerHTML += `<div class="msg bot">${m}</div>`; this.scroll(); },
            scroll: function() { const b = document.getElementById('ai-box'); b.scrollTop = b.scrollHeight; },
            clear: function() { document.getElementById('t').value=''; document.getElementById('f').value=''; document.getElementById('d').value=''; }
        };
        window.onload = () => core.render();
    </script>
</body>
</html>
