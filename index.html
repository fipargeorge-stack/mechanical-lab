<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORG TRUSSIA | Mechanical Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-space: #020617; }
        body { background-color: var(--dark-space); color: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid var(--neon-cyan); background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 80%); }
        h1 { font-size: 3.5rem; background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5)); }
        .container { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; }
        .admin-box { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--neon-cyan); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea { background: #0a192f; border: 1px solid #1e293b; padding: 15px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; }
        input[type="file"] { padding: 10px; background: #112240; cursor: pointer; }
        input:focus { border-color: var(--neon-cyan); outline: none; }
        .btn-add { grid-column: span 2; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 0 20px var(--neon-purple); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .card { background: #0f172a; border-radius: 15px; overflow: hidden; border: 1px solid #1e293b; transition: 0.3s; }
        .card:hover { border-color: var(--neon-cyan); transform: scale(1.02); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card h3 { color: var(--neon-cyan); margin: 0; }
        .card p { color: #94a3b8; font-size: 0.9rem; margin: 10px 0; }
        #ai-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--neon-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 0 15px var(--neon-cyan); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1>GEORG TRUSSIA</h1>
    <p style="color: var(--neon-cyan)">MECHANICAL LAB SYSTEM v4.0</p>
</header>

<div class="container">
    <div class="admin-box">
        <h2 style="color: var(--neon-cyan); margin-top:0"><i class="fas fa-camera"></i> إضافة مشروع من الاستوديو</h2>
        <div class="input-grid">
            <input type="text" id="t" placeholder="اسم المشروع">
            <input type="file" id="fileInput" accept="image/*">
            <textarea id="d" style="grid-column: span 2" rows="3" placeholder="المواصفات الهندسية..."></textarea>
            <button class="btn-add" onclick="core.add()">نشر المشروع بالصورة المختارة</button>
        </div>
    </div>
    <div id="display" class="grid"></div>
</div>

<div id="ai-btn" onclick="core.ai()">🤖</div>

<script>
    const core = {
        db: JSON.parse(localStorage.getItem('georg_gallery_db')) || [],
        
        add: function() {
            const valT = document.getElementById('t').value;
            const valD = document.getElementById('d').value;
            const fileFile = document.getElementById('fileInput').files[0];

            if(!valT || !fileFile) return alert("الرجاء إدخال الاسم واختيار صورة من الجاليري!");

            const reader = new FileReader();
            reader.onloadend = () => {
                const obj = {
                    id: Date.now(),
                    title: valT,
                    image: reader.result, // تحويل الصورة لكود نصي للحفظ
                    desc: valD
                };
                this.db.push(obj);
                localStorage.setItem('georg_gallery_db', JSON.stringify(this.db));
                this.render();
                this.clear();
            };
            reader.readAsDataURL(fileFile);
        },

        render: function() {
            document.getElementById('display').innerHTML = this.db.map(p => `
                <div class="card">
                    <img src="${p.image}">
                    <div class="card-body">
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <button onclick="core.del(${p.id})" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:5px 10px; border-radius:5px; cursor:pointer">حذف المشروع</button>
                    </div>
                </div>
            `).join('');
        },

        del: function(id) {
            this.db = this.db.filter(x => x.id !== id);
            localStorage.setItem('georg_gallery_db', JSON.stringify(this.db));
            this.render();
        },

        clear: function() {
            document.getElementById('t').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('d').value = '';
        },

        ai: function() {
            alert("مهندس جورج! يمكنك الآن الضغط على 'Choose File' لتفتح الاستوديو مباشرة. الصور تُحفظ في ذاكرة متصفحك.");
        }
    };
    window.onload = () => core.render();
</script>
</body>
</html>
