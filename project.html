<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخطط التقني | GEORGE TROUSIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.1; pointer-events: none; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .container { max-width: 800px; margin: 0 auto; background: rgba(15, 23, 42, 0.9); border: 2px solid var(--neon-purple); border-radius: 25px; padding: 25px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); }
        .back-btn { color: var(--neon-cyan); text-decoration: none; display: inline-block; margin-bottom: 20px; border: 1px solid var(--neon-cyan); padding: 8px 15px; border-radius: 10px; font-weight: bold; }
        .main-img { width: 100%; border-radius: 20px; border: 2px solid var(--neon-cyan); margin-bottom: 25px; cursor: zoom-in; }
        h3 { color: var(--neon-cyan); border-right: 4px solid var(--neon-purple); padding-right: 15px; margin-top: 30px; }
        textarea { width: 100%; background: #050a14; border: 1px solid var(--neon-cyan); color: #fff; padding: 20px; border-radius: 15px; font-size: 1.1rem; min-height: 300px; line-height: 1.6; outline: none; resize: vertical; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .gallery img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; border: 1px solid #334155; cursor: zoom-in; }
        .upload-zone { background: rgba(0, 242, 255, 0.05); border: 2px dashed var(--neon-cyan); padding: 20px; border-radius: 20px; text-align: center; margin-top: 30px; }
        .custom-upload-btn { background: var(--neon-purple); color: #fff; padding: 12px 25px; border-radius: 10px; cursor: pointer; display: inline-block; font-weight: bold; }
        .btn-save { background: var(--neon-cyan); color: #000; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 1.2rem; margin-top: 25px; cursor: pointer; }
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border: 2px solid var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lbImg" src=""></div>
    <div class="bg-elements"><i class="fas fa-cog gear" style="top:10%; right:5%; font-size: 100px;"></i></div>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمختبر</a>
        <div id="projectArea"></div>
        <div class="upload-zone">
            <label class="custom-upload-btn">
                <i class="fas fa-plus"></i> إضافة صور تفصيلية للمخطط
                <input type="file" accept="image/*" style="display:none" onchange="proj.upload(this)">
            </label>
        </div>
        <button class="btn-save" onclick="proj.save()">حفظ كافة التغييرات</button>
    </div>
    <script>
        const DB_NAME = 'georg_final_v1';
        const pid = new URLSearchParams(window.location.search).get('id');
        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
        let p = db.find(x => x.id === pid);

        const proj = {
            init: function() {
                if(!p) { document.getElementById('projectArea').innerHTML = "<h1>غير موجود!</h1>"; return; }
                this.render();
            },
            render: function() {
                document.getElementById('projectArea').innerHTML = `
                    <h1 style="color:var(--neon-cyan); text-align:center;">${p.title}</h1>
                    <img src="${p.image}" class="main-img" onclick="proj.zoom(this.src)">
                    <h3><i class="fas fa-scroll"></i> التقرير الهندسي:</h3>
                    <textarea id="descEdit">${p.desc || ''}</textarea>
                    <h3><i class="fas fa-images"></i> المعرض الإضافي:</h3>
                    <div class="gallery">${(p.gallery || []).map(img => `<img src="${img}" onclick="proj.zoom('${img}')">`).join('')}</div>
                `;
            },
            zoom: function(src) { document.getElementById('lbImg').src = src; document.getElementById('lightbox').style.display = 'flex'; },
            upload: function(input) {
                if (input.files[0]) {
                    const r = new FileReader();
                    r.onload = (e) => { if(!p.gallery) p.gallery = []; p.gallery.push(e.target.result); this.render(); };
                    r.readAsDataURL(input.files[0]);
                }
            },
            save: function() {
                p.desc = document.getElementById('descEdit').value;
                localStorage.setItem(DB_NAME, JSON.stringify(db));
                alert("تم الحفظ بنجاح!");
            }
        };
        window.onload = () => proj.init();
    </script>
</body>
</html>
