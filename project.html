<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخطط التقني | GEORG TRUSSIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        
        /* التروس الخلفية (نفس الثيم الأصلي) */
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.1; pointer-events: none; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { max-width: 800px; margin: 0 auto; background: rgba(15, 23, 42, 0.9); border: 2px solid var(--neon-purple); border-radius: 25px; padding: 25px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); position: relative; z-index: 10; }
        .back-btn { color: var(--neon-cyan); text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: bold; border: 1px solid var(--neon-cyan); padding: 8px 15px; border-radius: 10px; }
        .back-btn:hover { background: var(--neon-cyan); color: #000; }
        
        .main-img { width: 100%; border-radius: 20px; border: 2px solid var(--neon-cyan); margin-bottom: 25px; cursor: zoom-in; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        
        h3 { color: var(--neon-cyan); border-right: 4px solid var(--neon-purple); padding-right: 15px; margin-top: 30px; }
        
        /* الخانة الكبيرة التي طلبتها في الصور */
        textarea { width: 100%; background: #050a14; border: 1px solid var(--neon-cyan); color: #fff; padding: 20px; border-radius: 15px; font-size: 1.1rem; min-height: 280px; line-height: 1.6; outline: none; resize: vertical; }
        textarea:focus { border-color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .gallery img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; border: 1px solid #334155; cursor: zoom-in; transition: 0.3s; }
        .gallery img:hover { border-color: var(--neon-cyan); transform: scale(1.05); }
        
        .upload-zone { background: rgba(0, 242, 255, 0.05); border: 2px dashed var(--neon-cyan); padding: 20px; border-radius: 20px; text-align: center; margin-top: 30px; }
        .custom-upload-btn { background: var(--neon-purple); color: #fff; padding: 12px 25px; border-radius: 10px; cursor: pointer; display: inline-block; margin-top: 10px; font-weight: bold; transition: 0.3s; }
        .custom-upload-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-purple); }
        .custom-upload-btn input { display: none; }

        .btn-save { background: var(--neon-cyan); color: #000; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 1.2rem; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #fff; box-shadow: 0 0 25px var(--neon-cyan); transform: translateY(-2px); }

        /* نافذة التكبير (Lightbox) */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; cursor: zoom-out; }
        #lightbox img { max-width: 95%; max-height: 95%; border: 2px solid var(--neon-cyan); border-radius: 10px; box-shadow: 0 0 30px var(--neon-cyan); }
    </style>
</head>
<body>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lbImg" src=""></div>
    
    <div class="bg-elements">
        <i class="fas fa-cog gear" style="top:15%; right:8%; font-size: 90px;"></i>
        <i class="fas fa-cog gear" style="bottom:10%; left:5%; font-size: 130px; animation-direction: reverse;"></i>
    </div>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمختبر</a>
        
        <div id="contentArea">
            </div>
        
        <div class="upload-zone">
            <p style="color: var(--neon-cyan); margin-bottom: 5px;"><i class="fas fa-images"></i> إضافة صور تفصيلية للأجزاء:</p>
            <label class="custom-upload-btn">
                <i class="fas fa-plus"></i> اختر صور المعرض
                <input type="file" accept="image/*" onchange="projectModule.handleUpload(this)">
            </label>
        </div>
        
        <button class="btn-save" onclick="projectModule.saveData()">حفظ كافة التقرير الميكانيكي</button>
    </div>

    <script>
        // الربط بنفس اسم القاعدة الجديدة
        const DB_KEY = 'georg_vfinal';
        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('id');
        
        let localDB = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let projectData = localDB.find(x => x.id === pid);

        const projectModule = {
            init: function() {
                if(!projectData) {
                    document.getElementById('contentArea').innerHTML = "<h1 style='color:red; text-align:center;'>المشروع غير موجود!</h1>";
                    return;
                }
                this.render();
            },
            render: function() {
                document.getElementById('contentArea').innerHTML = `
                    <h1 style="color:var(--neon-cyan); text-align:center; font-size:2.2rem; margin-bottom:20px;">${projectData.title}</h1>
                    <img src="${projectData.image}" class="main-img" onclick="projectModule.zoom(this.src)">
                    
                    <h3><i class="fas fa-tools"></i> المواصفات الفنية والتقرير:</h3>
                    <textarea id="descEdit" placeholder="اكتب هنا تفاصيل المحركات، التروس، والسكاكين...">${projectData.desc || ''}</textarea>
                    
                    <h3><i class="fas fa-layer-group"></i> معرض الصور الإضافية (انقر للتكبير):</h3>
                    <div class="gallery">${(projectData.gallery || []).map(img => `<img src="${img}" onclick="projectModule.zoom('${img}')">`).join('')}</div>
                `;
            },
            zoom: function(imgSrc) {
                document.getElementById('lbImg').src = imgSrc;
                document.getElementById('lightbox').style.display = 'flex';
            },
            handleUpload: function(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if(!projectData.gallery) projectData.gallery = [];
                        projectData.gallery.push(e.target.result);
                        this.render();
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },
            saveData: function() {
                projectData.desc = document.getElementById('descEdit').value;
                localStorage.setItem(DB_KEY, JSON.stringify(localDB));
                alert("تم تحديث المخطط الهندسي وحفظه في المعمل!");
            }
        };

        window.onload = () => projectModule.init();
    </script>
</body>
</html>
