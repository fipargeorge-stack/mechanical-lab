<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEORGE TROUSIA | Lab V.Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #020617; }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.15; pointer-events: none; }
        .gear { position: absolute; color: var(--neon-cyan); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--neon-cyan); }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 600px; margin: -30px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .admin-box { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--neon-cyan); padding: 25px; border-radius: 25px; }
        .input-form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea { width: 100%; background: #0a192f; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; color: white; outline: none; }
        .file-label { width: 100%; background: rgba(0, 242, 255, 0.05); border: 2px dashed var(--neon-cyan); padding: 15px; border-radius: 12px; color: var(--neon-cyan); text-align: center; cursor: pointer; font-weight: bold; }
        .btn-add { background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .grid { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .card { background: rgba(15, 23, 42, 0.8); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card img { width: 100%; height: auto; border-bottom: 1px solid var(--neon-cyan); cursor: pointer; }
        .delete-btn { color: #ff4d4d; background: none; border: 1px solid #ff4d4d; padding: 5px 10px; border-radius: 8px; cursor: pointer; float: left; margin: 15px; }
        
        /* زر تنظيف الذاكرة الطارئ */
        .reset-storage { background: none; border: 1px solid #334155; color: #334155; padding: 5px; font-size: 10px; cursor: pointer; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="bg-elements"><i class="fas fa-cog gear" style="top:5%; left:5%; font-size: 80px;"></i></div>
    <header><h1>GEORGE TROUSIA</h1></header>
    <div class="container">
        <div class="admin-box">
            <div class="input-form">
                <input type="text" id="pTitle" placeholder="اسم المشروع">
                <label class="file-label"><i class="fas fa-camera"></i> ارفع صورة <input type="file" id="pFile" accept="image/*" style="display:none"></label>
                <textarea id="pDesc" rows="4" placeholder="المواصفات..."></textarea>
                <button class="btn-add" onclick="processAndSave()">حفظ المشروع بنجاح</button>
                <button class="reset-storage" onclick="clearAllData()">فرمتة الذاكرة (استخدمه في حال التعليق)</button>
            </div>
        </div>
        <div id="displayArea" class="grid"></div>
    </div>

    <script>
        const DB_NAME = 'georg_final_v1';

        // وظيفة الضغط الفائقة (Super Compression)
        function processAndSave() {
            const title = document.getElementById('pTitle').value;
            const desc = document.getElementById('pDesc').value;
            const file = document.getElementById('pFile').files[0];

            if (!title || !file) return alert("البيانات ناقصة!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // تصغير الحجم لضمان الحفظ 800px عرض ممتاز جداً للمتصفح
                    const MAX_WIDTH = 800;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // ضغط عالي بنسبة 0.6 لتقليل الحجم 80%
                    const finalData = canvas.toDataURL('image/jpeg', 0.6);
                    
                    try {
                        let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
                        db.push({ id: Date.now().toString(), title, desc, image: finalData, gallery: [] });
                        localStorage.setItem(DB_NAME, JSON.stringify(db));
                        location.reload();
                    } catch (error) {
                        alert("الذاكرة ممتلئة تماماً بالصور القديمة! اضغط على 'فرمتة الذاكرة' وجرب مجدداً.");
                    }
                }
            }
            reader.readAsDataURL(file);
        }

        function clearAllData() {
            if(confirm("سيتم حذف جميع المشاريع القديمة لتنظيف المساحة، هل أنت متأكد؟")) {
                localStorage.removeItem(DB_NAME);
                location.reload();
            }
        }

        function render() {
            const db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            document.getElementById('displayArea').innerHTML = db.map(p => `
                <div class="card">
                    <img src="${p.image}" onclick="location.href='project.html?id=${p.id}'">
                    <div class="card-body" style="padding:15px">
                        <h3 style="color:var(--neon-cyan);margin:0">${p.title}</h3>
                        <button class="delete-btn" onclick="deleteP('${p.id}')">حذف</button>
                    </div>
                </div>`).join('');
        }

        function deleteP(id) {
            let db = JSON.parse(localStorage.getItem(DB_NAME)).filter(x => x.id !== id);
            localStorage.setItem(DB_NAME, JSON.stringify(db));
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
